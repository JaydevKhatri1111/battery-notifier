name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller psutil pywin32 winotify
          python -m pywin32_postinstall -install

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole `
            --add-data "Alarm01.wav;." `
            --add-data "battery.ico;." `
            battery_notifier.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: battery-notifier
          path: dist/*.exe
          retention-days: 30
