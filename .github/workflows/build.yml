name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install pyinstaller psutil pywin32 winotify

    - name: Build EXE
      run: |
        pyinstaller --onefile --noconsole ^
        --add-data "Alarm01.wav;." ^
        main.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: battery-app
        path: dist/*.exe
