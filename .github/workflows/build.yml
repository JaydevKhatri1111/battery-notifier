name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller psutil pywin32 winotify
          $postinstall = Get-ChildItem -Recurse `
            -Path "C:\hostedtoolcache\windows\Python\3.11.9\x64" `
            -Filter "pywin32_postinstall.py" `
            | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Found postinstall at: $postinstall"
          python $postinstall -install

      - name: Build EXE
        run: |
          if (Test-Path "battery.ico") {
            pyinstaller --onefile --noconsole --add-data "Alarm01.wav;." --add-data "battery.ico;." battery_notifier.py
          } else {
            pyinstaller --onefile --noconsole --add-data "Alarm01.wav;." battery_notifier.py
          }

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: battery-notifier
          path: dist/*.exe
          retention-days: 30
